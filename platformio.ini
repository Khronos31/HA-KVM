[platformio]
default_envs = receiver
extra_configs = secrets.ini

[env:receiver]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = m5stack-atoms3
framework = arduino
build_src_filter = +<receiver/>
lib_ldf_mode = deep
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D WIFI_SSID='"${secrets.wifi_ssid}"'
	-D WIFI_PASSWORD='"${secrets.wifi_password}"'
lib_deps = 
	m5stack/M5AtomS3
	m5stack/M5Unified
	fastled/FastLED
	gilmaimon/ArduinoWebsockets
board_build.partitions = huge_app.csv

; AtomS3U: キーボード＋システムコントロール(電源/スリープ/ウェイク)＋音量 レシーバ。
; WSでキーボード、HTTPエンドポイント(/sleep 等)で電源系を操作する。
[env:kbd_spoof]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = m5stack-atoms3u
framework = arduino
build_src_filter = +<kbd_spoof/>
lib_ldf_mode = deep
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D WIFI_SSID='"${secrets.wifi_ssid}"'
	-D WIFI_PASSWORD='"${secrets.wifi_password}"'
lib_deps =
	gilmaimon/ArduinoWebsockets
board_build.partitions = huge_app.csv

[env:sender]
platform = espressif32@6.9.0
board = m5stack-stamps3
framework = arduino
build_src_filter = +<sender/>
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D ARDUINO_RUNNING_CORE=1
	-D ARDUINO_EVENT_RUNNING_CORE=1
lib_deps =
	h2zero/NimBLE-Arduino@^1.4.1

; 計測用: BTマウスを使わず、既知のテスト値を掃引してgamepad軸の変換を測る
[env:sender_calib]
extends = env:sender
build_flags =
	${env:sender.build_flags}
	-D CALIB_MODE

[env:mouse_test]
; M5Stamp-S3Aなど、BLEが使えるESP32S3ボードで動作確認
platform = espressif32@6.9.0
board = m5stack-stamps3
framework = arduino
build_src_filter = +<mouse_test/>
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps = 
	h2zero/NimBLE-Arduino@^1.4.1

[env:tv_receiver]
; AtomS3使用。Android TVなどをHTTP経由でキーボード操作するレシーバー
platform = espressif32@~6.9.0
board = m5stack-atoms3
framework = arduino
build_src_filter = +<tv_receiver/>
lib_ldf_mode = deep
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D WIFI_SSID='"${secrets.wifi_ssid}"'
	-D WIFI_PASSWORD='"${secrets.wifi_password}"'
